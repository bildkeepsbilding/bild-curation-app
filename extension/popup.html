<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <link rel="stylesheet" href="popup.css">
  <title>Bild</title>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <span class="header-logo">Bild</span>
    <span class="header-badge">Sift</span>
  </div>

  <!-- Loading State -->
  <div id="state-loading" class="state active">
    <div class="loading-content">
      <div class="spinner"></div>
      <div class="loading-text">Connecting...</div>
    </div>
  </div>

  <!-- Sign-in State -->
  <div id="state-signin" class="state">
    <div class="signin-content">
      <div class="signin-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="signin-title">Sign in to Bild</div>
      <div class="signin-subtitle">Click below to sign in to your Bild account.</div>
      <button id="signin-btn" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Sign in
      </button>
    </div>
  </div>

  <!-- Ready State -->
  <div id="state-ready" class="state">
    <!-- Page info -->
    <div class="url-section">
      <div class="url-label">Current Page</div>
      <div id="page-title" class="url-title"></div>
      <div id="page-url" class="url-value"></div>
    </div>

    <!-- Duplicate warning -->
    <div id="duplicate-warning" class="duplicate-warning"></div>

    <!-- Project selector -->
    <div class="field">
      <div class="field-label">Save to</div>
      <select id="project-select"></select>
    </div>

    <!-- Context note -->
    <div class="field">
      <div class="field-label">Context for Claude</div>
      <textarea id="note-input" rows="3" placeholder="Why are you saving this? What should Claude focus on?"></textarea>
    </div>

    <!-- Capture button -->
    <button id="sift-btn" class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2v8M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Sift it
    </button>
  </div>

  <!-- Sifting State -->
  <div id="state-sifting" class="state">
    <div class="loading-content">
      <div class="spinner"></div>
      <div class="loading-text">Sifting...</div>
    </div>
  </div>

  <!-- Success State -->
  <div id="state-success" class="state">
    <div class="success-content">
      <div class="success-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M5 13l4 4L19 7" stroke="#0a0a0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div id="success-text" class="success-text"></div>
      <div class="success-subtext">Closing in a moment...</div>
    </div>
  </div>

  <!-- Error State -->
  <div id="state-error" class="state">
    <div class="error-content">
      <div id="error-message" class="error-message"></div>
      <button id="retry-btn" class="btn-secondary">Try again</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a id="signout-link" class="settings-link" style="display: none;">Sign out</a>
    <span class="footer-spacer"></span>
    <a id="settings-link" class="settings-link">⚙ Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
